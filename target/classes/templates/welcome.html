<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Account Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            color: #1f2933;
            margin: 0;
        }

        main {
            max-width: 720px;
            margin: 60px auto;
            padding: 32px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        h1, h2 {
            margin-top: 0;
        }

        nav a {
            display: inline-block;
            margin-right: 16px;
            color: #0f4c81;
            text-decoration: none;
            font-weight: 600;
        }

        nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<main>
    <p>Project Week 3</p>
    <h1>Bank Account Management System</h1>
    <h2>Alex James</h2>
    <p>Welcome to the Week 3 Spring Boot MVC project.</p>
    <p>Use the navigation links below to move to the account form page or the account listing page as those features are added.</p>

    <nav>
        <a th:href="@{/form}" href="/form">Go to Form</a>
        <a th:href="@{/accounts}" href="/accounts">View Accounts</a>
    </nav>
</main>
</body>
</html>
