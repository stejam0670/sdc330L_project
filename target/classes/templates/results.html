<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submission Results</title>
    <link
      rel="stylesheet"
      th:href="@{/css/styles.css}"
      href="/css/styles.css"
    />
  </head>
  <body>
    <main>
      <h1>Account Saved</h1>
      <p>Your account information was submitted successfully.</p>
      <p th:if="${savedAccountInfo}" th:text="${savedAccountInfo}">
        Saved account details appear here.
      </p>

      <nav>
        <a th:href="@{/form}" href="/form">Add Another Account</a>
        <a th:href="@{/accounts}" href="/accounts">View Accounts</a>
        <a th:href="@{/home}" href="/home">Home</a>
      </nav>
    </main>
  </body>
</html>
